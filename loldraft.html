<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>LoL Draft Simulator</title>
<link rel="stylesheet" href="style.css">
</head>



<body>
<a href="index.html" class="back-button">← Home</a>
<h1>Whisper Draft Simulator</h1>



<div class="container">

<div class="team">
<h2>Blue Team</h2>

<div class="slot" id="b1"></div>
<div class="slot" id="b2"></div>
<div class="slot" id="b3"></div>
<div class="slot" id="b4"></div>
<div class="slot" id="b5"></div>

</div>


<div class="champion-area">

<div class="role-filters">

<button class="role-btn" data-role="top">Top</button>
<button class="role-btn" data-role="jungle">Jungle</button>
<button class="role-btn" data-role="mid">Mid</button>
<button class="role-btn" data-role="bottom">ADC</button>
<button class="role-btn" data-role="support">Support</button>

</div>

<input id="search" placeholder="Search champion">

<div class="recommend-bar">
<div id="recommendations"></div>
</div>

<div id="championPool"></div>

</div>


<div class="team">
<h2>Red Team</h2>

<div class="slot" id="r1"></div>
<div class="slot" id="r2"></div>
<div class="slot" id="r3"></div>
<div class="slot" id="r4"></div>
<div class="slot" id="r5"></div>

</div>

</div>

<script src="champions.js"></script>
<script src="script.js"></script>








<div class="draft-eval">

<div class="eval-label blue-label">Blue</div>

<div class="eval-bar">
<div class="blue-win" id="blueWin"></div>
<div class="red-win" id="redWin"></div>
</div>

<div class="eval-label red-label">Red</div>

</div>

</body>
</html>
